<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact - Bright Future Academy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav class="navbar">
        <h2 class="logo">Bright Future Academy</h2>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="courses.html">Courses</a></li>
            <li><a href="results.html">Results</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<section class="contact-hero">
    <div class="contact-hero-content">
        <h1>Let’s Connect</h1>
        <p>Have questions about admissions or courses? We’re here to help.</p>
    </div>
</section>

<section class="contact-section">
    <h1>Contact Us</h1>

    <div class="contact-container">

        <div class="contact-info">
            <h3>Get In Touch</h3>
            <p><strong>Phone:</strong> +91 9876543210</p>
            <p><strong>Email:</strong> info@brightfuture.com</p>
            <p><strong>Address:</strong> Jabalpur, Madhya Pradesh</p>
        </div>

        <div class="contact-form">
            <form action="https://formsubmit.co/your-email@gmail.com" method="POST">
                <input type="text" name="name" placeholder="Your Name" required>
                <input type="email" name="email" placeholder="Your Email" required>
                <textarea name="message" placeholder="Your Message" rows="5" required></textarea>
                <button type="submit" class="btn">Send Message</button>
            </form>
        </div>

    </div>
</section>

<script src="script.js"></script>
</body>
</html>
